# ============================================================
# 合规智审 Copilot — 生产环境 Docker 部署
# 使用方式: docker compose -f docker-compose.prod.yml up -d
# ============================================================
# 包含: Nginx 反向代理 + 限流 + 压缩 + SSL(需自行配置证书)
# ============================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_DB: contract_review
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U contract_user -d contract_review']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend-network
    profiles:
      - all

  redis:
    image: redis:7-alpine
    command: >
      sh -c 'redis-server
      --requirepass "$$REDIS_PASSWORD"
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
      --tcp-keepalive 60
      --save 900 1
      --save 300 10
      --save 60 10000'
    ports:
      - '127.0.0.1:6379:6379'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend-network
    profiles:
      - all

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql://contract_user:${POSTGRES_PASSWORD}@postgres:5432/contract_review
      - AUTO_SEED_LEGAL_KNOWLEDGE=1
      - PADDLE_PDX_MODEL_SOURCE=BOS
      - REDIS_ENABLED=true
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_FILE=/app/data/jwt_secret
      - ALLOW_DEV_CODE_RESPONSE=${ALLOW_DEV_CODE_RESPONSE:-false}
      - HTTP_PROXY=${BACKEND_HTTP_PROXY:-}
      - HTTPS_PROXY=${BACKEND_HTTPS_PROXY:-}
      - ALL_PROXY=${BACKEND_ALL_PROXY:-}
      - NO_PROXY=${BACKEND_NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      - PORT=8000
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    networks:
      - backend-network
    profiles:
      - all

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - backend-network
    profiles:
      - all

  nginx:
    image: nginx:alpine
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 将以下两行取消注释并填入证书路径以启用 HTTPS
      # - /path/to/your/cert.pem:/etc/nginx/certs/cert.pem:ro
      # - /path/to/your/key.pem:/etc/nginx/certs/key.pem:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - backend-network
    profiles:
      - all

volumes:
  postgres_data:
  redis_data:
  backend_data:

networks:
  backend-network:
    driver: bridge
